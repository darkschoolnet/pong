<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 2-Player Pong</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; /* Verhindert Scrollen beim Spielen */
        }
        canvas {
            background: #000;
            border: 4px solid #fff;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Spielfeld-Größe anpassen
    canvas.width = 800;
    canvas.height = 600;

    const paddleWidth = 100, paddleHeight = 20;
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballDX = 4, ballDY = 4;
    const ballRadius = 10;

    let p1X = (canvas.width - paddleWidth) / 2;
    let p2X = (canvas.width - paddleWidth) / 2;
    let p1Score = 0, p2Score = 0;

    // Touch-Steuerung
    window.addEventListener('touchstart', handleTouch);
    window.addEventListener('touchmove', handleTouch);

    function handleTouch(e) {
        e.preventDefault();
        for (let i = 0; i < e.touches.length; i++) {
            let touch = e.touches[i];
            let rect = canvas.getBoundingClientRect();
            let touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            let touchY = (touch.clientY - rect.top) * (canvas.height / rect.height);

            // Obere Hälfte steuert P2, untere Hälfte P1
            if (touchY < canvas.height / 2) {
                p2X = touchX - paddleWidth / 2;
            } else {
                p1X = touchX - paddleWidth / 2;
            }
        }
    }

    function draw() {
        // Hintergrund
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Mittellinie
        ctx.strokeStyle = "white";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();

        // Schläger (P1 unten, P2 oben)
        ctx.fillStyle = "cyan";
        ctx.fillRect(p1X, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
        ctx.fillStyle = "magenta";
        ctx.fillRect(p2X, 10, paddleWidth, paddleHeight);

        // Ball
        ctx.beginPath();
        ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.closePath();

        // Score
        ctx.font = "30px Arial";
        ctx.fillStyle = "white";
        ctx.fillText(p2Score, 20, canvas.height / 2 - 20);
        ctx.fillText(p1Score, 20, canvas.height / 2 + 45);

        // Ball-Logik
        ballX += ballDX;
        ballY += ballDY;

        // Wände (links/rechts)
        if (ballX + ballRadius > canvas.width || ballX - ballRadius < 0) ballDX *= -1;

        // Kollision Schläger Oben (P2)
        if (ballY - ballRadius < 10 + paddleHeight && ballX > p2X && ballX < p2X + paddleWidth) {
            ballDY = Math.abs(ballDY);
            ballDY += 0.2; // Schneller werden
        }
        
        // Kollision Schläger Unten (P1)
        if (ballY + ballRadius > canvas.height - 10 - paddleHeight && ballX > p1X && ballX < p1X + paddleWidth) {
            ballDY = -Math.abs(ballDY);
            ballDY -= 0.2;
        }

        // Punkt erzielen
        if (ballY < 0) { p1Score++; resetBall(); }
        if (ballY > canvas.height) { p2Score++; resetBall(); }

        requestAnimationFrame(draw);
    }

    function resetBall() {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        ballDY = ballDY > 0 ? -4 : 4;
        ballDX = (Math.random() - 0.5) * 8;
    }

    draw();
</script>
</body>
</html>
