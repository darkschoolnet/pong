<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Duel Pong</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 90vw;  /* Nutzt 90% der Breite */
            height: 80vh; /* Nutzt 80% der Höhe */
            max-width: 500px; /* Begrenzung für bessere Spielbarkeit */
            border: 3px solid #444;
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            z-index: 10;
            text-align: center;
        }
        button {
            padding: 20px 50px;
            font-size: 20px;
            background: #00f2ff;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 0 15px #00f2ff;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen" class="overlay">
        <h2 style="color: #00f2ff">NEON PONG</h2>
        <p>Ein Finger pro Spieler.<br>Das iPad flach auf den Tisch legen.</p>
        <button onclick="startGame()">START</button>
    </div>

    <div id="gameOverScreen" class="overlay" style="display: none;">
        <h2 id="winnerLabel"></h2>
        <button onclick="startGame()">REMATCH</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const winnerLabel = document.getElementById("winnerLabel");

    // Interne Auflösung festlegen
    canvas.width = 400;
    canvas.height = 600;

    const paddleWidth = 80;
    const paddleHeight = 12;
    let p1X, p2X, ballX, ballY, ballDX, ballDY, p1Score, p2Score;
    let gameRunning = false;

    function resetPositions() {
        p1X = (canvas.width - paddleWidth) / 2;
        p2X = (canvas.width - paddleWidth) / 2;
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        
        // Moderate Startgeschwindigkeit
        ballDX = (Math.random() > 0.5 ? 2.5 : -2.5);
        ballDY = (Math.random() > 0.5 ? 3.5 : -3.5);
    }

    function startGame() {
        p1Score = 0;
        p2Score = 0;
        resetPositions();
        gameRunning = true;
        startScreen.style.display = "none";
        gameOverScreen.style.display = "none";
        requestAnimationFrame(update);
    }

    // Touch Handling verbessert für iPad
    window.addEventListener('touchstart', handleTouch, {passive: false});
    window.addEventListener('touchmove', handleTouch, {passive: false});

    function handleTouch(e) {
        if (!gameRunning) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            let tx = (t.clientX - rect.left) * scaleX;
            let ty = (t.clientY - rect.top) * scaleY;

            // Untere Hälfte = Spieler 1, Obere Hälfte = Spieler 2
            if (ty > canvas.height / 2) {
                p1X = Math.max(0, Math.min(canvas.width - paddleWidth, tx - paddleWidth / 2));
            } else {
                p2X = Math.max(0, Math.min(canvas.width - paddleWidth, tx - paddleWidth / 2));
            }
        }
    }

    function update() {
        if (!gameRunning) return;

        ballX += ballDX;
        ballY += ballDY;

        // Seitliche Wände
        if (ballX <= 0 || ballX >= canvas.width) {
            ballDX *= -1;
            ballX = ballX <= 0 ? 1 : canvas.width - 1; // "Steckenbleiben" verhindern
        }

        // Kollision oben (P2)
        if (ballY <= 25 && ballY > 10 && ballX > p2X && ballX < p2X + paddleWidth) {
            ballDY = Math.abs(ballDY); // Immer nach unten abprallen
            // Winkel basierend auf Treffpunkt berechnen (verhindert extremes Zickzack)
            let impact = (ballX - (p2X + paddleWidth/2)) / (paddleWidth/2);
            ballDX = impact * 4;
            limitSpeed();
        }

        // Kollision unten (P1)
        if (ballY >= canvas.height - 25 && ballY < canvas.height - 10 && ballX > p1X && ballX < p1X + paddleWidth) {
            ballDY = -Math.abs(ballDY); // Immer nach oben abprallen
            let impact = (ballX - (p1X + paddleWidth/2)) / (paddleWidth/2);
            ballDX = impact * 4;
            limitSpeed();
        }

        // Punktvergabe
        if (ballY < 0) { p1Score++; checkPoint(); }
        if (ballY > canvas.height) { p2Score++; checkPoint(); }

        draw();
        requestAnimationFrame(update);
    }

    function limitSpeed() {
        // Ball wird minimal schneller, aber gedeckelt auf einen Max-Wert
        if (Math.abs(ballDY) < 7) ballDY *= 1.05;
    }

    function checkPoint() {
        if (p1Score >= 7 || p2Score >= 7) {
            gameRunning = false;
            winnerLabel.innerText = p1Score >= 7 ? "SPIELER 1 GEWINNT!" : "SPIELER 2 GEWINNT!";
            gameOverScreen.style.display = "flex";
        } else {
            resetPositions();
        }
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Score Anzeige im Hintergrund
        ctx.fillStyle = "#222";
        ctx.font = "bold 60px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(p2Score, canvas.width/2, canvas.height/4);
        ctx.fillText(p1Score, canvas.width/2, (canvas.height/4)*3);

        // Paddles
        ctx.fillStyle = "#ff00ff"; // P2 Magenta
        ctx.fillRect(p2X, 10, paddleWidth, paddleHeight);
        ctx.fillStyle = "#00f2ff"; // P1 Cyan
        ctx.fillRect(p1X, canvas.height - 10 - paddleHeight, paddleWidth, paddleHeight);

        // Ball
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(ballX, ballY, 8, 0, Math.PI*2);
        ctx.fill();
    }
</script>
</body>
</html>
