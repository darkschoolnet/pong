<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Touch Pong</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
        }
        canvas {
            background: #000;
            border: 2px solid #333;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 10;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background: cyan;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px cyan;
        }
        button:active { transform: scale(0.95); }
        h1 { margin-bottom: 10px; text-shadow: 0 0 10px cyan; }
        p { margin-bottom: 20px; color: #ccc; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen" class="overlay">
        <h1>NEON PONG</h1>
        <p>Zwei Spieler - Gegenüber aufstellen</p>
        <button onclick="startGame()">Start</button>
    </div>

    <div id="gameOverScreen" class="overlay" style="display: none;">
        <h1 id="winnerLabel">SPIELER 1 SIEGT!</h1>
        <button onclick="startGame()">Nochmal</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const winnerLabel = document.getElementById("winnerLabel");

    canvas.width = 600;
    canvas.height = 800; // Hochformat ist besser für iPad-Duelle

    const paddleWidth = 120, paddleHeight = 15;
    let ballX, ballY, ballDX, ballDY;
    let p1X, p2X, p1Score, p2Score;
    let gameRunning = false;
    const winningScore = 5;

    function initGame() {
        p1Score = 0;
        p2Score = 0;
        resetPositions();
    }

    function resetPositions() {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        // Startgeschwindigkeit: Langsam (3)
        ballDX = (Math.random() > 0.5 ? 1 : -1) * 3;
        ballDY = (Math.random() > 0.5 ? 1 : -1) * 3;
        p1X = (canvas.width - paddleWidth) / 2;
        p2X = (canvas.width - paddleWidth) / 2;
    }

    function startGame() {
        initGame();
        gameRunning = true;
        startScreen.style.display = "none";
        gameOverScreen.style.display = "none";
        requestAnimationFrame(update);
    }

    window.addEventListener('touchstart', handleTouch, {passive: false});
    window.addEventListener('touchmove', handleTouch, {passive: false});

    function handleTouch(e) {
        if (!gameRunning) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        
        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            let tx = (t.clientX - rect.left) * (canvas.width / rect.width);
            let ty = (t.clientY - rect.top) * (canvas.height / rect.height);

            if (ty > canvas.height / 2) {
                p1X = Math.max(0, Math.min(canvas.width - paddleWidth, tx - paddleWidth / 2));
            } else {
                p2X = Math.max(0, Math.min(canvas.width - paddleWidth, tx - paddleWidth / 2));
            }
        }
    }

    function update() {
        if (!gameRunning) return;

        ballX += ballDX;
        ballY += ballDY;

        // Wand-Kollision
        if (ballX <= 0 || ballX >= canvas.width) ballDX *= -1;

        // Schläger-Kollision (P2 Oben)
        if (ballY <= 30 && ballX > p2X && ballX < p2X + paddleWidth) {
            ballDY = Math.abs(ballDY) + 0.3; // Ball wird leicht schneller
            ballDX += (ballX - (p2X + paddleWidth/2)) * 0.1; // Winkel ändern
        }

        // Schläger-Kollision (P1 Unten)
        if (ballY >= canvas.height - 30 && ballX > p1X && ballX < p1X + paddleWidth) {
            ballDY = -Math.abs(ballDY) - 0.3;
            ballDX += (ballX - (p1X + paddleWidth/2)) * 0.1;
        }

        // Punkt-Logik
        if (ballY < 0) { p1Score++; checkWinner(); }
        else if (ballY > canvas.height) { p2Score++; checkWinner(); }

        draw();
        if (gameRunning) requestAnimationFrame(update);
    }

    function checkWinner() {
        if (p1Score >= winningScore || p2Score >= winningScore) {
            gameRunning = false;
            winnerLabel.innerText = p1Score >= winningScore ? "SPIELER 1 GEWINNT!" : "SPIELER 2 GEWINNT!";
            gameOverScreen.style.display = "flex";
        } else {
            resetPositions();
        }
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Mittellinie
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height/2);
        ctx.lineTo(canvas.width, canvas.height/2);
        ctx.stroke();

        // Scores
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.font = "bold 80px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(p2Score, canvas.width/2, canvas.height/2 - 50);
        ctx.fillText(p1Score, canvas.width/2, canvas.height/2 + 120);

        // Paddles
        ctx.shadowBlur = 15;
        ctx.fillStyle = "magenta"; ctx.shadowColor = "magenta";
        ctx.fillRect(p2X, 15, paddleWidth, paddleHeight);
        
        ctx.fillStyle = "cyan"; ctx.shadowColor = "cyan";
        ctx.fillRect(p1X, canvas.height - 30, paddleWidth, paddleHeight);

        // Ball
        ctx.fillStyle = "white"; ctx.shadowColor = "white";
        ctx.beginPath();
        ctx.arc(ballX, ballY, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    draw(); // Initiales Zeichnen
</script>
</body>
</html>
